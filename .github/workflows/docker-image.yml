  name: Build and Push Docker Image

  on:
    push:
      branches: [main]

  env:
    IMAGE: ste80pa/firebase

  jobs:
    extract-version:
      runs-on: ubuntu-latest
      outputs:
        version: ${{ steps.extract.outputs.version }}
      steps:
        - uses: actions/checkout@v4
        - id: extract
          run: |
            version=$(grep '^ARG FIREBASE_VERSION=' Dockerfile | cut -d'=' -f2)
            echo "version=$version" >> "$GITHUB_OUTPUT"

    build:
      needs: extract-version
      runs-on: ubuntu-latest
      strategy:
        fail-fast: false
        matrix:
          platform:
            - linux/amd64
            - linux/arm64
      steps:
        - name: Prepare platform name
          run: |
            platform=${{ matrix.platform }}
            echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"

        - uses: actions/checkout@v4

        - name: Set up QEMU
          uses: docker/setup-qemu-action@v3

        - name: Set up Docker Buildx
          uses: docker/setup-buildx-action@v3
  
        - name: Log in to Docker Hub
          uses: docker/login-action@v3
          with:
            username: ${{ secrets.DOCKER_USERNAME }}
            password: ${{ secrets.DOCKER_PASSWORD }}

        - name: Build and push by digest
          id: build
          uses: docker/build-push-action@v6
          with:
            context: .
            platforms: ${{ matrix.platform }}
            build-args: |
              FIREBASE_VERSION=${{ needs.extract-version.outputs.version }}
            outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true

        - name: Export digest
          run: |
            mkdir -p /tmp/digests
            digest="${{ steps.build.outputs.digest }}"
            touch "/tmp/digests/${digest#sha256:}"

        - name: Upload digest
          uses: actions/upload-artifact@v4
          with:
            name: digests-${{ env.PLATFORM_PAIR }}
            path: /tmp/digests/*
            if-no-files-found: error
            retention-days: 1
  
    merge:
      needs:
        - extract-version
        - build
      runs-on: ubuntu-latest
      steps:
        - name: Download digests
          uses: actions/download-artifact@v4
          with:
            path: /tmp/digests
            pattern: digests-*
            merge-multiple: true

        - name: Set up Docker Buildx
          uses: docker/setup-buildx-action@v3

        - name: Log in to Docker Hub
          uses: docker/login-action@v3
          with:
            username: ${{ secrets.DOCKER_USERNAME }}
            password: ${{ secrets.DOCKER_PASSWORD }}

        - name: Create manifest list and push
          working-directory: /tmp/digests
          run: |
            docker buildx imagetools create \
              -t ${{ env.IMAGE }}:latest \
              -t ${{ env.IMAGE }}:${{ needs.extract-version.outputs.version }} \
              $(printf '${{ env.IMAGE }}@sha256:%s ' *)

        - name: Inspect image
          run: |
            docker buildx imagetools inspect ${{ env.IMAGE }}:${{ needs.extract-version.outputs.version }}
